# configs/onset_offset.yaml
# Configuration for the note onset/offset detection module.
# Extends the original Note Model/configs/default.yaml with system fields.

audio:
  sample_rate: 16000
  n_fft: 1024
  hop_length: 256
  n_mels: 80
  fmin: 0.0
  fmax: 8000.0

model:
  cnn_channels: [32, 64, 128, 128]
  lstm_hidden_size: 256
  lstm_num_layers: 2
  lstm_dropout: 0.3
  head_hidden_size: 128
  dropout: 0.3

training:
  batch_size: 16
  num_epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 15
  grad_clip: 1.0
  onset_weight: 1.0
  offset_weight: 1.0
  label_sigma: 0.02      # Gaussian soft-label sigma in seconds

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4
  segment_length: 10.0   # fixed crop in seconds (null = variable length)

peak_picking:
  onset_threshold: 0.3
  offset_threshold: 0.3
  min_distance_frames: 3

evaluation:
  tolerance_ms: 50

paths:
  data_dir: data
  checkpoint_dir: checkpoints
  log_dir: logs
